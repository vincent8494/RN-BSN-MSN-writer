[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # @libsql/client ships platform-specific native pieces — include the package
  # as-is rather than letting esbuild inline it.
  external_node_modules = ["@libsql/client", "libsql"]

# Old Netlify subdomain → custom domain (SEO: one canonical host).
[[redirects]]
  from = "https://rnbsn-msn-writers.netlify.app/*"
  to = "https://nursingflexpathwriters.com/:splat"
  status = 301
  force = true

# API → serverless function (rewrite, keeps /api/* URLs).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — existing static files are served first (no force).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Vite emits content-hashed assets — cache them forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Site images/icons change rarely — cache for 30 days.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
