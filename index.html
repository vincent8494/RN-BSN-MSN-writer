  <body>
    <div id="preloader" aria-hidden="true">
      <div class="pl-box">
        <div class="pl-spin"></div>
        <p class="pl-text">Nursing FlexPath Writers</p>
      </div>
    </div>
    <style>
      #preloader { position: fixed; inset: 0; z-index: 9999; background: #f8fafc; display: grid; place-items: center; transition: opacity 0.4s ease, visibility 0.4s ease; }
      #preloader.done { opacity: 0; visibility: hidden; pointer-events: none; }
      .pl-box { display: grid; place-items: center; gap: 14px; }
      .pl-spin { width: 44px; height: 44px; border-radius: 50%; border: 3px solid #c5d9ee; border-top-color: #345e94; animation: pl-rotate 0.8s linear infinite; }
      .pl-text { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #345e94; margin: 0; }
      @keyframes pl-rotate { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .pl-spin { animation: none; } #preloader { transition: none; } }
    </style>
    <script>
      // Safety net: never trap the user behind the preloader.
      setTimeout(function () {
        var p = document.getElementById("preloader");
        if (p) p.classList.add("done");
      }, 4000);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
